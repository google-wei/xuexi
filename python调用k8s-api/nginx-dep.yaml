apiVersion: apps/v1
kind: Deployment
metadata:
  name: test
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      nodeName: k8s-master
      containers:
        - name: test
          image: nginx:1.18
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
