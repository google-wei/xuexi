import urllib3
import yaml
from kubernetes import config,client
urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

class DepManager:
    def __init__(self,config_file):
        config.load_kube_config(config_file)
        self.apis = client.AppsV1Api()

    def UpdateDep(self,yamlFile):
        with open(yamlFile,encoding='utf-8')as f:
            body = yaml.safe_load(f)

        res = self.apis.patch_namespaced_deployment("test","default",body)
        return res

if __name__ == "__main__":
    dep_m = DepManager(config_file="config")

    update = dep_m.UpdateDep("update-dep.yaml")
    print(f"Rollout Deployment Successful:{update}")

